<h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#002b40;line-height:1.3;">Seu link de acesso</h1>
<p style="margin:0 0 20px;color:#7a7e87;font-size:15px;line-height:1.5;">
  Recebemos uma solicitação de login para <strong>{{ .Email }}</strong>.
</p>
<p style="margin:0 0 8px;color:#002b40;font-size:15px;">
  Clique no botão abaixo para entrar na Arena Digital. Não é necessário senha.
</p>
<table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:28px 0;">
  <tr>
    <td style="border-radius:8px;background-color:#ff6b00;">
      <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 32px;font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:8px;">
        Entrar na conta
      </a>
    </td>
  </tr>
</table>
<p style="margin:0 0 8px;color:#7a7e87;font-size:13px;line-height:1.5;">
  Este link expira em breve e só pode ser usado uma vez.
</p>
<p style="margin:16px 0 0;color:#7a7e87;font-size:13px;line-height:1.5;">
  Ou use o código de acesso:
</p>
<p style="margin:8px 0 0;font-size:24px;font-weight:700;color:#002b40;letter-spacing:4px;font-family:monospace;">
  {{ .Token }}
</p>
